<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – User Registration & Identity Verification Module</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="steps">
      <div class="step active"><span class="step-num">1</span>Register</div>
      <div class="step"><span class="step-num">2</span>OTP</div>
      <div class="step"><span class="step-num">3</span>Profile</div>
      <div class="step"><span class="step-num">4</span>ID</div>
    </div>
    <div class="card">
      <h1>Create account</h1>
      <p class="subtitle">Use your email and mobile number to register.</p>
      <div id="alert" class="alert alert-error" style="display: none;"></div>
      <form id="register-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="mobile">Mobile number</label>
          <input type="tel" id="mobile" name="mobile" placeholder="09XXXXXXXXX" required maxlength="11" minlength="11" pattern="[0-9]{11}" />
        </div>
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8" />
          <span class="field-hint">At least 8 characters, one letter, and one number.</span>
        </div>
        <button type="submit" class="btn btn-primary">Continue</button>
      </form>
      <p class="mt-2 text-center">
        <a href="index.html" class="link">Back to home</a>
      </p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
