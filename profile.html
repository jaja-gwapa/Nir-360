<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile setup – User Registration & Identity Verification Module</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="steps">
      <div class="step done"><span class="step-num">1</span>Register</div>
      <div class="step done"><span class="step-num">2</span>OTP</div>
      <div class="step active"><span class="step-num">3</span>Profile</div>
      <div class="step"><span class="step-num">4</span>ID</div>
    </div>
    <div class="card">
      <h1>Profile setup</h1>
      <p class="subtitle">Full name, address, barangay, birthdate, and emergency contact.</p>
      <div id="alert" class="alert alert-error" style="display: none;"></div>
      <form id="profile-form">
        <div class="form-group">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Juan Dela Cruz" required />
        </div>
        <div class="form-group">
          <label for="birthdate">Birthdate</label>
          <input type="date" id="birthdate" name="birthdate" required />
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" name="address" rows="2" placeholder="Street, City" required></textarea>
        </div>
        <div class="form-group">
          <label for="barangay">Barangay</label>
          <input type="text" id="barangay" name="barangay" placeholder="Barangay name" required />
        </div>
        <div class="form-group">
          <label for="emergencyContact">Emergency contact</label>
          <input type="tel" id="emergencyContact" name="emergencyContact" placeholder="09XXXXXXXXX or name + number" required />
        </div>
        <button type="submit" class="btn btn-primary">Continue</button>
      </form>
      <p class="mt-2 text-center">
        <a href="verify-otp.html" class="link">Back</a>
      </p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
