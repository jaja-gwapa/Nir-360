<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – User Registration & Identity Verification Module</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <div id="admin-login" class="card">
      <h1>System Admin</h1>
      <p class="subtitle">Verification fallback – sign in to review pending IDs.</p>
      <form id="admin-form">
        <div class="form-group">
          <label for="admin-email">Email</label>
          <input type="email" id="admin-email" value="admin@verify.local" placeholder="admin@verify.local" />
        </div>
        <div class="form-group">
          <label for="admin-pass">Password</label>
          <input type="password" id="admin-pass" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary">Enter admin panel</button>
      </form>
      <p class="mt-2 text-center">
        <a href="index.html" class="link">Back to home</a>
      </p>
    </div>
    <div id="admin-panel" class="card" style="display: none;">
      <h1>Verification fallback</h1>
      <p class="subtitle">Review and approve or reject pending ID verifications.</p>
      <p class="mt-1">
        <a href="dashboard.html" class="link">← Dashboard</a>
      </p>
      <div id="pending-list" class="mt-2"></div>
      <p id="no-pending" class="text-center" style="display: none; color: var(--text-muted);">No pending verifications.</p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
